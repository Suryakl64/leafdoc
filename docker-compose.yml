version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: plant-disease-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: plant_disease_db
    volumes:
      - mongodb_data:/data/db
      - ./docs/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    networks:
      - plant-disease-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/plant_disease_db --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: plant-disease-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URL=mongodb://mongodb:27017
      - DATABASE_NAME=plant_disease_db
      - CORS_ORIGINS=http://localhost:3000,http://localhost:5173
    volumes:
      - ./backend:/app
      - ./models:/app/models
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - plant-disease-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: plant-disease-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - plant-disease-network

volumes:
  mongodb_data:
    driver: local

networks:
  plant-disease-network:
    driver: bridge
